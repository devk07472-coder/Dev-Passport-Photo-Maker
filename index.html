<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="google-site-verification" content="GyXRV8I-w9psY8tf1BDGm5JzzfSo1ACiOs_hHO1taYw" />
    <title>Sarthi Photo Studio - best passport photo in dandkarwan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { --primary: #6366f1; --success: #10b981; --dark: #0f172a; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 0;
            background: #111827;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-section {
            width: 100%;
            text-align: center;
            padding: 30px 10px;
            background: linear-gradient(to bottom, #1e293b, #111827);
        }

        .header-brand { 
            font-size: 2.1rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            color: yellow;
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.8);
            margin: 0;
        }

        .sub-text { font-size: 0.8rem; opacity: 0.7; margin-top: 5px; letter-spacing: 1px; }

        .container { 
            width: 95%;
            max-width: 400px;
            background: #ffffff; 
            padding: 20px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: #333;
            margin-bottom: 50px;
            box-sizing: border-box;
        }

        .upload-area { 
            border: 3px dashed var(--primary); 
            padding: 80px 10px; 
            border-radius: 18px; 
            background: #f8fafc; 
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
            cursor: pointer;
            text-align: center;
        }

        .controls { display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 12px; font-weight: bold; color: #64748b; margin-bottom: 5px; display: block; text-align: left;}

        select { 
            width: 100%;
            padding: 12px; 
            border-radius: 12px; 
            font-size: 14px; 
            border: 2px solid #e2e8f0;
            background: #fff;
            margin-bottom: 10px;
        }

        button { 
            width: 100%;
            padding: 16px; 
            border-radius: 14px; 
            font-size: 18px; 
            font-weight: 800;
            border: none;
            cursor: pointer;
            color: white;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 5px;
        }

        .btn-gen { background: var(--primary); }
        .btn-down { background: var(--success); }
        .btn-print { background: var(--dark); }
        button:disabled { opacity: 0.5; }

        #cropModal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: #000; overflow-y: auto;}
        .modal-content { min-height: 100%; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;}
        .img-container { flex-grow: 1; max-height: 60vh; margin: 10px 0; overflow: hidden; background: #111; border-radius: 10px;}

        .slider-box {
            background: #1e293b;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            text-align: center;
        }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--primary); }

        #canvas-wrapper { 
            margin-top: 25px; 
            border-radius: 15px; 
            display: none; 
            padding: 20px; 
            background: #e2e8f0; 
            text-align: center;
        }
        canvas { 
            max-width: 200px; /* Display size control */
            height: auto; 
            border-radius: 5px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .footer { margin-top: 25px; font-size: 13px; font-weight: bold; color: #6366f1; }

        @media print {
            .header-section, .container, .footer, #cropModal { display: none !important; }
            #canvas-wrapper { display: block !important; position: absolute; left: 0; top: 0; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 class="header-brand">SARTHI PHOTO STUDIO</h1>
        <div class="sub-text">💯FREE/REAL PASSPORT PHOTO MAKER</div>
    </div>

    <div class="container">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <span id="statusText">📸 TAP TO UPLOAD PHOTO</span>
            <input type="file" id="fileInput" accept="image/*" hidden>
        </div>

        <div class="controls">
            <div>
                <label>SELECT PHOTO SIZE</label>
                <select id="pSize">
                    <option value="35-45">35x45mm (India Passport)</option>
                    <option value="50-50">2x2 Inch (Visa Size)</option>
                </select>
            </div>

            <button class="btn-gen" id="genBtn">🚀 GENERATE PHOTO</button>
            <button class="btn-down" id="downBtn" disabled>💾 DOWNLOAD PHOTO</button>
            <button class="btn-print" id="printBtn" onclick="window.print()" disabled>🖨️ PRINT PHOTO</button>
        </div>

        <div id="canvas-wrapper">
            <p style="font-size: 12px; color: #475569; margin-bottom: 10px;">PREVIEW:</p>
            <canvas id="mainCanvas"></canvas>
        </div>
    </div>

    <div class="h3"><a href="https://www.instagram.com/dev_alone95?igsh=MWhmZ2k1NmF2czNieA=="> © DEV_ALONE95 </a>- Owner Details</div>

    <div id="cropModal">
        <div class="modal-content">
            <h2 style="color:white; text-align:center; margin: 10px 0;">Crop & Adjust</h2>
            <div class="img-container">
                <img id="imageToCrop">
            </div>
            <div class="slider-box">
                <label style="color: white; font-size: 14px;">☀️ BRIGHTNESS: <span id="bVal">100</span>%</label>
                <input type="range" id="brightnessSlider" min="50" max="200" value="100">
            </div>
            <button class="btn-gen" id="cropDoneBtn">✅ DONE - PROCEED</button>
            <button style="background:none; color:gray; font-size:12px; margin-top:10px;" onclick="location.reload()">Cancel</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script>
        const API_KEY = 'YCZpJFuzwAg5HWg5Z8rYuJa5';
        const fileInput = document.getElementById('fileInput');
        const cropModal = document.getElementById('cropModal');
        const imageToCrop = document.getElementById('imageToCrop');
        const brightnessSlider = document.getElementById('brightnessSlider');
        const bVal = document.getElementById('bVal');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        
        let cropper;
        let croppedBlob = null;
        let aiFinalImage = null;

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imageToCrop.src = event.target.result;
                    cropModal.style.display = 'block';
                    if (cropper) cropper.destroy();
                    
                    const [w, h] = document.getElementById('pSize').value.split('-').map(Number);
                    cropper = new Cropper(imageToCrop, {
                        aspectRatio: w / h,
                        viewMode: 1,
                        autoCropArea: 1
                    });
                    brightnessSlider.value = 100;
                    bVal.innerText = 100;
                };
                reader.readAsDataURL(file);
            }
        };

        brightnessSlider.oninput = () => {
            bVal.innerText = brightnessSlider.value;
            const filterValue = `brightness(${brightnessSlider.value}%)`;
            document.querySelector('.cropper-view-box img').style.filter = filterValue;
            document.querySelector('.cropper-canvas img').style.filter = filterValue;
        };

        document.getElementById('cropDoneBtn').onclick = () => {
            const val = brightnessSlider.value;
            const croppedCanvas = cropper.getCroppedCanvas();
            const finalCanvas = document.createElement('canvas');
            const fCtx = finalCanvas.getContext('2d');
            finalCanvas.width = croppedCanvas.width;
            finalCanvas.height = croppedCanvas.height;
            fCtx.filter = `brightness(${val}%)`;
            fCtx.drawImage(croppedCanvas, 0, 0);

            finalCanvas.toBlob((blob) => {
                croppedBlob = blob;
                cropModal.style.display = 'none';
                document.getElementById('statusText').innerHTML = "✅ PHOTO READY!";
            }, 'image/jpeg', 0.95);
        };

        document.getElementById('genBtn').onclick = async () => {
            if (!croppedBlob) return alert("Pehle photo crop karein!");
            const btn = document.getElementById('genBtn');
            btn.innerText = "⏳ AI WORKING...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('image_file', croppedBlob);
            formData.append('bg_color', 'blue');

            try {
                const res = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST',
                    headers: { 'X-Api-Key': API_KEY },
                    body: formData
                });

                if (res.ok) {
                    const blob = await res.blob();
                    aiFinalImage = new Image();
                    aiFinalImage.onload = drawSinglePhoto;
                    aiFinalImage.src = URL.createObjectURL(blob);
                } else {
                    alert("API Error! Key check karein.");
                    btn.disabled = false;
                    btn.innerText = "🚀 GENERATE PHOTO";
                }
            } catch (err) {
                alert("Network Error!");
                btn.disabled = false;
            }
        };

        function drawSinglePhoto() {
            const [w_mm, h_mm] = document.getElementById('pSize').value.split('-').map(Number);
            
            // Setting High Quality Resolution (300 DPI approx)
            const targetW = w_mm * 11.8; // mm to pixels conversion
            const targetH = h_mm * 11.8;

            canvas.width = targetW;
            canvas.height = targetH;

            // Background White (if any transparent area left)
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, targetW, targetH);

            // Draw the single AI processed image
            ctx.drawImage(aiFinalImage, 0, 0, targetW, targetH);

            // Add Professional Border
            ctx.strokeStyle = "black";
            ctx.lineWidth = targetW * 0.02; // Dynamic border thickness
            ctx.strokeRect(0, 0, targetW, targetH);

            // UI Updates
            document.getElementById('canvas-wrapper').style.display = 'block';
            document.getElementById('downBtn').disabled = false;
            document.getElementById('printBtn').disabled = false;
            document.getElementById('genBtn').disabled = false;
            document.getElementById('genBtn').innerText = "✅ PHOTO READY";
            window.scrollTo(0, document.body.scrollHeight);
        }

        document.getElementById('downBtn').onclick = () => {
            canvas.toBlob((blob) => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'SARTHI_Passport_Photo.png';
                link.click();
            }, 'image/png');
        };
    </script>
</body>
</html>
